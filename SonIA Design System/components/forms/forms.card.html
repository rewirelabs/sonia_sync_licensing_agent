<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--bg-base); margin: 0; padding: 28px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 600px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select } = window.SonIADesignSystem_4b5948;
  const Clock = () => (<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.5 1.5"/></svg>);
  function Demo() {
    const [a,setA]=React.useState(''); const [b,setB]=React.useState('01:12');
    const [c,setC]=React.useState(''); const [lang,setLang]=React.useState('en');
    return (
      <div className="grid">
        <div><div className="lbl">Text</div><Input placeholder="Describe the scene…" value={a} onChange={e=>setA(e.target.value)}/></div>
        <div><div className="lbl">Mono / data</div><Input mono iconLeft={<Clock/>} value={b} onChange={e=>setB(e.target.value)}/></div>
        <div><div className="lbl">Invalid</div><Input invalid placeholder="Required" value={c} onChange={e=>setC(e.target.value)}/></div>
        <div><div className="lbl">Select</div><Select value={lang} onChange={e=>setLang(e.target.value)} style={{width:'100%'}} options={[{value:'en',label:'English'},{value:'it',label:'Italian'},{value:'es',label:'Spanish'}]}/></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
