<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & elevation" subtitle="Content 6–10px · pill reserved for SonIA bubbles" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--bg-base);margin:0;padding:22px;font-family:var(--font-body);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .box{width:88px;height:64px;background:var(--bg-elevated);border:1px solid var(--border-strong);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .shadow{box-shadow:var(--shadow-pop);border-color:var(--border)}
  .pill{border-radius:var(--radius-pill);background:transparent;border-color:var(--accent-action);color:var(--accent-action);align-items:center}
</style></head><body>
  <div class="box" style="border-radius:6px"><span class="v">sm · 6</span></div>
  <div class="box" style="border-radius:10px"><span class="v">md · 10</span></div>
  <div class="box" style="border-radius:14px"><span class="v">lg · 14</span></div>
  <div class="box pill"><span class="v">pill · 999</span></div>
  <div class="box shadow" style="border-radius:10px"><span class="v">shadow-pop</span></div>
</body></html>
