<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px grid" subtitle="--space-1 … --space-16" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--bg-base);margin:0;padding:22px;font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--accent-action);border-radius:2px;width:100%}
  .box{width:34px;display:flex;align-items:flex-end;height:64px}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><div class="v">4</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><div class="v">8</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px"></div></div><div class="v">12</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><div class="v">16</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:20px"></div></div><div class="v">20</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px"></div></div><div class="v">24</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px"></div></div><div class="v">32</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:40px"></div></div><div class="v">40</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:48px"></div></div><div class="v">48</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:64px"></div></div><div class="v">64</div></div>
  </div>
</body></html>
