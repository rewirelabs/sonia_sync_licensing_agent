<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — the chassis" subtitle="Quiet anthracite backbone: backgrounds, borders, text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--bg-base);margin:0;padding:20px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-surface)}
  .chip{height:48px}
  .info{padding:7px 8px}
  .nm{font-size:11px;font-weight:500;color:var(--text-primary)}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:1px}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#14161B;border-bottom:1px solid var(--border)"></div><div class="info"><div class="nm">base</div><div class="hx">#14161B</div></div></div>
    <div class="sw"><div class="chip" style="background:#1C1F26"></div><div class="info"><div class="nm">surface</div><div class="hx">#1C1F26</div></div></div>
    <div class="sw"><div class="chip" style="background:#242832"></div><div class="info"><div class="nm">elevated</div><div class="hx">#242832</div></div></div>
    <div class="sw"><div class="chip" style="background:#2E333D"></div><div class="info"><div class="nm">border</div><div class="hx">#2E333D</div></div></div>
    <div class="sw"><div class="chip" style="background:#F4F5F7"></div><div class="info"><div class="nm">text-1</div><div class="hx">#F4F5F7</div></div></div>
    <div class="sw"><div class="chip" style="background:#A6ADB8"></div><div class="info"><div class="nm">text-2</div><div class="hx">#A6ADB8</div></div></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="info"><div class="nm">text-muted</div><div class="hx">#6B7280</div></div></div>
  </div>
</body></html>
