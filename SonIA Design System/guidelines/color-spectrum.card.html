<!-- @dsCard group="Colors" viewport="700x170" name="Emotional spectrum — the signature" subtitle="Cyanite curve mapped to intensity (calm → intense)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--bg-base);margin:0;padding:20px;font-family:var(--font-body)}
  .spectrum{height:64px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--spectrum)}
  .stops{display:flex;justify-content:space-between;margin-top:10px}
  .stops div{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);text-align:center;flex:1}
  .stops .hex{color:var(--text-muted);display:block;margin-top:2px;font-size:10px}
</style></head><body>
  <div class="spectrum"></div>
  <div class="stops">
    <div>calm<span class="hex">#4C6EF5</span></div>
    <div>mellow<span class="hex">#2DD4BF</span></div>
    <div>warm<span class="hex">#FACC15</span></div>
    <div>energetic<span class="hex">#FF6A2C</span></div>
    <div>intense<span class="hex">#F0386B</span></div>
  </div>
</body></html>
