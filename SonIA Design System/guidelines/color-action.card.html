<!-- @dsCard group="Colors" viewport="700x150" name="Action & micro-accent" subtitle="Orange = CTA only · cyan = focus / technical detail" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--bg-base);margin:0;padding:20px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:420px}
  .sw{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
  .chip{height:48px}
  .info{padding:7px 9px;background:var(--bg-surface)}
  .nm{font-size:11px;font-weight:500;color:var(--text-primary)}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:1px}
  .note{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:14px;letter-spacing:.02em}
</style></head><body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FF6A2C"></div><div class="info"><div class="nm">action</div><div class="hx">#FF6A2C</div></div></div>
    <div class="sw"><div class="chip" style="background:#FF7E47"></div><div class="info"><div class="nm">action hover</div><div class="hx">#FF7E47</div></div></div>
    <div class="sw"><div class="chip" style="background:#E85A20"></div><div class="info"><div class="nm">action press</div><div class="hx">#E85A20</div></div></div>
    <div class="sw"><div class="chip" style="background:#2DD4BF"></div><div class="info"><div class="nm">micro · cyan</div><div class="hx">#2DD4BF</div></div></div>
  </div>
  <div class="note">orange is reserved for CTAs &amp; active states · cyan for focus rings &amp; technical detail</div>
</body></html>
